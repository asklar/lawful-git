<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .bg{fill:#0f172a}
      .panel{fill:#111827;stroke:#334155;stroke-width:2}
      .title{fill:#e5e7eb;font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .text{fill:#cbd5e1;font:14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .muted{fill:#94a3b8;font:13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .btnA{fill:#2563eb}
      .btnB{fill:#374151}
      .btnText{fill:#f8fafc;font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .mono{fill:#e2e8f0;font:12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="900" height="520"/>
  <rect class="panel" x="70" y="60" rx="18" ry="18" width="760" height="400"/>
  <text class="title" x="110" y="110">Telegram DM — lawful-git consent</text>
  <text class="muted" x="110" y="140">(illustration)</text>

  <rect x="110" y="165" width="680" height="190" rx="12" ry="12" fill="#0b1220" stroke="#334155" stroke-width="1"/>

  <text class="text" x="135" y="200">lawful-git consent required</text>
  <text class="text" x="135" y="228">repo: /home/asklar/ai-social</text>
  <text class="text" x="135" y="252">branch: main</text>
  <text class="text" x="135" y="276">action:</text>
  <text class="mono" x="195" y="276">git commit -m "test consent"</text>
  <text class="text" x="135" y="310">justification:</text>
  <text class="mono" x="255" y="310">testing openclaw consent integration</text>

  <rect class="btnA" x="110" y="375" rx="10" ry="10" width="140" height="44"/>
  <rect class="btnB" x="260" y="375" rx="10" ry="10" width="140" height="44"/>
  <text class="btnText" x="152" y="403">Approve</text>
  <text class="btnText" x="308" y="403">Reject</text>

  <text class="muted" x="110" y="450">Buttons send callback_data: lawful:approve:&lt;id&gt; / lawful:deny:&lt;id&gt;</text>
</svg>
