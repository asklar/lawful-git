<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .bg{fill:#0b1220}
      .win{fill:#111827;stroke:#475569;stroke-width:2}
      .bar{fill:#1f2937}
      .title{fill:#e5e7eb;font:700 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .text{fill:#cbd5e1;font:14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .muted{fill:#94a3b8;font:12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
      .btn{fill:#374151;stroke:#64748b;stroke-width:1}
      .btnPrimary{fill:#2563eb;stroke:#1d4ed8;stroke-width:1}
      .btnText{fill:#f8fafc;font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="900" height="520"/>
  <rect class="win" x="160" y="110" rx="12" ry="12" width="580" height="300"/>
  <rect class="bar" x="160" y="110" rx="12" ry="12" width="580" height="42"/>
  <text class="title" x="190" y="137">lawful-git — Consent required</text>
  <text class="muted" x="190" y="170">(illustration)</text>
  <text class="text" x="190" y="210">Force push requires consent.</text>
  <text class="text" x="190" y="238">Proceed with this operation?</text>

  <rect class="btnPrimary" x="420" y="340" rx="8" ry="8" width="140" height="40"/>
  <rect class="btn" x="570" y="340" rx="8" ry="8" width="140" height="40"/>
  <text class="btnText" x="463" y="366">Approve</text>
  <text class="btnText" x="615" y="366">Cancel</text>
</svg>
